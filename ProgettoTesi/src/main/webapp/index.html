<body>

   <input  onclick="loadPage();" value="Carica pagina Web" type="button" class="button button1">
 	
	<div id="webPage"></div>
	<div id="output"></div>
</body>

<script>
 
		/* 
		 * Crea un oggetto websocket javascript utilizzando l'URL dall'endpoint del server Java	
		 */
		var ws = new WebSocket("ws://localhost:8080/index");
	
		// Funzione di callback Javascript quando viene stabilita la connessione. 
		ws.onopen = function() {
			console.log("On Open");
			$("#output").append("Connessione aperta al websocket<br/>");
			loadPage();
		}
 
		// Funzione di callback Javascript quando i messaggi vengono ricevuti dal server.
		ws.onmessage = function(msg) {
			console.log("On Message = " + msg);
			$("#output").append(msg.data + "<br/>");
			
		}
 
		// Funzione di callback Javascript quando la connessione è chiusa.
		ws.onclose = function(msg) {
			console.log("On Close = " + msg);
			$("#output").append("Connessione chiusa al websocket<br/>");
		}
		
		
		//Metodo che carica una pagina web
	    function loadPage() {
	    	$(document).ready(function(){		   
	    	 	  $('#webPage').load("giocoFrutta.html");
	    		});
	   }

	</script>
