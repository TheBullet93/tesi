<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="styleFrutta.css" rel="stylesheet">
</head>
<body>

<div style="text-align:center">
  <h2>Gioco della frutta</h2>
  <p>Seleziona un'immagine</p>
</div>

<!-- The four columns -->
<div class="row">
  <div class="column">
    <img src="immagini/banana.jpg" alt="Banana" style="width:100%" onclick="myFunction(this);">
  </div>
  <div class="column">
    <img src="immagini/mela.jpg" alt="Mela" style="width:100%" onclick="myFunction(this);">
  </div>
  <div class="column">
    <img src="immagini/pera.jpg" alt="Pera" style="width:100%" onclick="myFunction(this);">
  </div>
  <div class="column">
    <img src="immagini/melone.jpg" alt="Melone" style="width:100%" onclick="myFunction(this);">
  </div>
</div>

<div class="container">
  <span onclick="this.parentElement.style.display='none'" class="closebtn">&times;</span>
  <img id="expandedImg" style="width:100%">
  <div id="imgtext"></div>
</div>

<script src="scriptFrutta.js"></script>

</body>
</html>
